name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  # ============================================
  # Compute version tag once, share across jobs
  # ============================================
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      build_date: ${{ steps.tag.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}-${SHORT_SHA}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "::notice::Release tag: ${TAG} | Version: ${VERSION} | SHA: ${SHORT_SHA}"

  # ============================================
  # macOS arm64 client
  # ============================================
  build-macos-client:
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: macos-arm64-client
          cache-targets: true
          cache-all-crates: true

      - name: Build client
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client --target aarch64-apple-darwin

      - name: Package
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir -p dist/anima
          cp target/aarch64-apple-darwin/release/client dist/anima/anima
          cp -r assets dist/anima/
          echo "${TAG}" > dist/anima/VERSION
          cd dist && zip -r ../anima-macos-arm64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-macos-arm64
          path: anima-macos-arm64.zip
          retention-days: 30

  # ============================================
  # Linux x64 client
  # ============================================
  build-linux-client:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: linux-x64-client
          cache-targets: true
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build client
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client

      - name: Package
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir -p dist/anima
          cp target/release/client dist/anima/anima
          cp -r assets dist/anima/
          echo "${TAG}" > dist/anima/VERSION
          cd dist && zip -r ../anima-linux-x64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-x64
          path: anima-linux-x64.zip
          retention-days: 30

  # ============================================
  # Windows x64 client (cross-compile from Linux)
  # ============================================
  build-windows-client:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: windows-x64-client
          cache-targets: true
          cache-all-crates: true

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Build client
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir -p dist/anima
          cp target/x86_64-pc-windows-gnu/release/client.exe dist/anima/anima.exe
          cp -r assets dist/anima/
          echo "${TAG}" > dist/anima/VERSION
          cd dist && zip -r ../anima-windows-x64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-windows-x64
          path: anima-windows-x64.zip
          retention-days: 30

  # ============================================
  # Linux x64 server (headless)
  # ============================================
  build-linux-server:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # Server and Linux client share the same target triple — reuse compiled deps
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: linux-x64-server
          cache-targets: true
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Build server
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin server

      - name: Package
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir -p dist
          cp target/release/server dist/anima-server
          echo "${TAG}" > dist/VERSION
          cd dist && zip -r ../anima-linux-server.zip anima-server VERSION

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-server
          path: anima-linux-server.zip
          retention-days: 30

  # ============================================
  # Create GitHub Release with all artifacts
  # ============================================
  release:
    needs: [version, build-macos-client, build-linux-client, build-windows-client, build-linux-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Anima ${{ needs.version.outputs.tag }}"
          make_latest: true
          generate_release_notes: true
          body: |
            ## Anima ${{ needs.version.outputs.tag }}

            **Version:** `${{ needs.version.outputs.version }}` | **Commit:** `${{ needs.version.outputs.short_sha }}` | **Built:** `${{ needs.version.outputs.build_date }}`

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `anima-macos-arm64.zip` |
            | Linux (x64) | `anima-linux-x64.zip` |
            | Windows (x64) | `anima-windows-x64.zip` |
            | Server (Linux x64) | `anima-linux-server.zip` |
          files: |
            artifacts/anima-macos-arm64/anima-macos-arm64.zip
            artifacts/anima-linux-x64/anima-linux-x64.zip
            artifacts/anima-windows-x64/anima-windows-x64.zip
            artifacts/anima-linux-server/anima-linux-server.zip

  # ============================================
  # Deploy server binary to Salt Lake City box
  # ============================================
  deploy-server:
    needs: [version, release]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: anima-linux-server
          path: .

      - name: Deploy to game server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_TAG: ${{ needs.version.outputs.tag }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22}"

          # Upload new binary
          scp $SSH_OPTS anima-linux-server.zip "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/anima-linux-server.zip"

          # Run deploy script on server
          ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_TAG=${DEPLOY_TAG}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -euo pipefail

            INSTALL_DIR="/opt/anima"
            SERVICE_NAME="anima-server"

            echo "==> Deploying ${DEPLOY_TAG}..."
            cd /tmp
            unzip -o anima-linux-server.zip
            chmod +x anima-server

            echo "==> Stopping ${SERVICE_NAME}..."
            sudo systemctl stop ${SERVICE_NAME} || true

            echo "==> Installing new binary..."
            sudo mkdir -p ${INSTALL_DIR}
            sudo mv anima-server ${INSTALL_DIR}/anima-server
            sudo chown root:root ${INSTALL_DIR}/anima-server
            echo "${DEPLOY_TAG}" | sudo tee ${INSTALL_DIR}/VERSION > /dev/null

            echo "==> Starting ${SERVICE_NAME}..."
            sudo systemctl start ${SERVICE_NAME}

            echo "==> Verifying..."
            sleep 2
            if sudo systemctl is-active --quiet ${SERVICE_NAME}; then
              echo "==> Deploy successful! ${DEPLOY_TAG} is running."
            else
              echo "==> ERROR: Server failed to start!"
              sudo journalctl -u ${SERVICE_NAME} --no-pager -n 20
              exit 1
            fi

            rm -f /tmp/anima-linux-server.zip /tmp/VERSION
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
