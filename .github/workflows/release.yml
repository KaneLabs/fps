name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================
  # Compute version tag once, share across jobs
  # ============================================
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      build_date: ${{ steps.tag.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}-${SHORT_SHA}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "::notice::Release tag: ${TAG} | Version: ${VERSION} | SHA: ${SHORT_SHA}"

  # ============================================
  # macOS arm64 — .app bundle + .dmg installer
  # ============================================
  build-macos-client:
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: macos-arm64-client
          cache-targets: true
          cache-all-crates: true

      - name: Build client
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client --target aarch64-apple-darwin

      - name: Create .app bundle
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          APP="Anima.app"
          CONTENTS="${APP}/Contents"

          # Directory structure
          mkdir -p "${CONTENTS}/MacOS"
          mkdir -p "${CONTENTS}/Resources"

          # Binary
          cp target/aarch64-apple-darwin/release/client "${CONTENTS}/MacOS/anima"
          chmod +x "${CONTENTS}/MacOS/anima"

          # Assets — game needs these at runtime, placed next to binary
          cp -r assets "${CONTENTS}/Resources/assets"

          # Wrapper script: cd to Resources so the binary finds assets/
          cp macos/anima-launcher "${CONTENTS}/MacOS/anima-launcher"
          chmod +x "${CONTENTS}/MacOS/anima-launcher"

          # Update Info.plist to use the launcher
          sed -e "s/__VERSION__/${TAG}/" \
              -e "s/__SHORT_VERSION__/${VERSION}/" \
              -e "s|<string>anima</string>|<string>anima-launcher</string>|" \
              macos/Info.plist.template > "${CONTENTS}/Info.plist"

          # Icon
          cp assets/AppIcon.icns "${CONTENTS}/Resources/AppIcon.icns"

          # Version file
          echo "${TAG}" > "${CONTENTS}/Resources/VERSION"

          echo "==> Anima.app bundle created"
          ls -la "${CONTENTS}/MacOS/"
          ls -la "${CONTENTS}/Resources/"

      - name: Create .dmg installer
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          DMG_NAME="anima-macos-arm64-${TAG}.dmg"
          DMG_STABLE="anima-macos-arm64.dmg"

          # Create a temporary directory for DMG contents
          mkdir -p dmg-staging

          # Copy the app
          cp -r Anima.app dmg-staging/

          # Create Applications symlink for drag-to-install
          ln -s /Applications dmg-staging/Applications

          # Create the DMG (retry — hdiutil can fail with "Resource busy" on CI runners)
          for i in 1 2 3; do
            hdiutil create \
              -volname "Anima ${TAG}" \
              -srcfolder dmg-staging \
              -ov \
              -format UDZO \
              "${DMG_NAME}" && break
            echo "hdiutil attempt $i failed, retrying in 5s..."
            sleep 5
          done

          # Stable-named copy for website
          cp "${DMG_NAME}" "${DMG_STABLE}"

          echo "==> Created ${DMG_NAME} ($(du -h "${DMG_NAME}" | cut -f1))"

      - name: Upload versioned DMG
        uses: actions/upload-artifact@v4
        with:
          name: anima-macos-arm64-dmg-versioned
          path: anima-macos-arm64-${{ needs.version.outputs.tag }}.dmg
          retention-days: 30

      - name: Upload stable DMG
        uses: actions/upload-artifact@v4
        with:
          name: anima-macos-arm64-dmg-stable
          path: anima-macos-arm64.dmg
          retention-days: 30

  # ============================================
  # Linux x64 client
  # ============================================
  build-linux-client:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: linux-x64-client
          cache-targets: true
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build client
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client

      - name: Package
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          mkdir -p dist/anima
          cp target/release/client dist/anima/anima
          cp -r assets dist/anima/
          echo "${TAG}" > dist/anima/VERSION

          cd dist && zip -r "../anima-linux-x64-${TAG}.zip" anima/
          cd ..
          cp "anima-linux-x64-${TAG}.zip" anima-linux-x64.zip

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-x64-versioned
          path: anima-linux-x64-${{ needs.version.outputs.tag }}.zip
          retention-days: 30

      - name: Upload stable artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-x64-stable
          path: anima-linux-x64.zip
          retention-days: 30

  # ============================================
  # Windows x64 client (cross-compile from Linux)
  # ============================================
  build-windows-client:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: windows-x64-client
          cache-targets: true
          cache-all-crates: true

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Build client
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin client --target x86_64-pc-windows-gnu

      - name: Package
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          mkdir -p dist/anima
          cp target/x86_64-pc-windows-gnu/release/client.exe dist/anima/anima.exe
          cp -r assets dist/anima/
          echo "${TAG}" > dist/anima/VERSION

          cd dist && zip -r "../anima-windows-x64-${TAG}.zip" anima/
          cd ..
          cp "anima-windows-x64-${TAG}.zip" anima-windows-x64.zip

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-windows-x64-versioned
          path: anima-windows-x64-${{ needs.version.outputs.tag }}.zip
          retention-days: 30

      - name: Upload stable artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-windows-x64-stable
          path: anima-windows-x64.zip
          retention-days: 30

  # ============================================
  # Linux x64 server (headless)
  # ============================================
  build-linux-server:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          shared-key: linux-x64-server
          cache-targets: true
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Build server
        env:
          ANIMA_VERSION: ${{ needs.version.outputs.tag }}
          ANIMA_BUILD_SHA: ${{ needs.version.outputs.short_sha }}
          ANIMA_BUILD_DATE: ${{ needs.version.outputs.build_date }}
        run: cargo build --release --bin server

      - name: Package
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          mkdir -p dist
          cp target/release/server dist/anima-server
          echo "${TAG}" > dist/VERSION

          cd dist && zip -r "../anima-linux-server-${TAG}.zip" anima-server VERSION
          cd ..
          cp "anima-linux-server-${TAG}.zip" anima-linux-server.zip

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-server-versioned
          path: anima-linux-server-${{ needs.version.outputs.tag }}.zip
          retention-days: 30

      - name: Upload stable artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-server-stable
          path: anima-linux-server.zip
          retention-days: 30

  # ============================================
  # Create GitHub Release with all artifacts
  # ============================================
  release:
    needs: [version, build-macos-client, build-linux-client, build-windows-client, build-linux-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Anima ${{ needs.version.outputs.tag }}"
          make_latest: true
          generate_release_notes: true
          body: |
            ## Anima ${{ needs.version.outputs.tag }}

            **Version:** `${{ needs.version.outputs.version }}` | **Commit:** `${{ needs.version.outputs.short_sha }}` | **Built:** `${{ needs.version.outputs.build_date }}`

            ### Downloads
            | Platform | File |
            |---|---|
            | **macOS** (Apple Silicon) | `anima-macos-arm64.dmg` |
            | **Linux** (x64) | `anima-linux-x64.zip` |
            | **Windows** (x64) | `anima-windows-x64.zip` |

            **macOS:** Download the `.dmg`, open it, drag **Anima.app** to Applications. Right-click → Open on first launch (not yet code-signed).
            **Windows/Linux:** Extract the `.zip` and run `anima` (or `anima.exe`).
          files: |
            artifacts/anima-macos-arm64-dmg-versioned/anima-macos-arm64-${{ needs.version.outputs.tag }}.dmg
            artifacts/anima-macos-arm64-dmg-stable/anima-macos-arm64.dmg
            artifacts/anima-linux-x64-versioned/anima-linux-x64-${{ needs.version.outputs.tag }}.zip
            artifacts/anima-linux-x64-stable/anima-linux-x64.zip
            artifacts/anima-windows-x64-versioned/anima-windows-x64-${{ needs.version.outputs.tag }}.zip
            artifacts/anima-windows-x64-stable/anima-windows-x64.zip
            artifacts/anima-linux-server-versioned/anima-linux-server-${{ needs.version.outputs.tag }}.zip
            artifacts/anima-linux-server-stable/anima-linux-server.zip

  # ============================================
  # Deploy server binary to Salt Lake City box
  # ============================================
  deploy-server:
    needs: [version, release]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: anima-linux-server-stable
          path: .

      - name: Deploy to game server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_TAG: ${{ needs.version.outputs.tag }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22}"

          scp $SSH_OPTS anima-linux-server.zip "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/anima-linux-server.zip"

          ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_TAG=${DEPLOY_TAG}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -euo pipefail

            INSTALL_DIR="/opt/anima"
            SERVICE_NAME="anima-server"

            echo "==> Deploying ${DEPLOY_TAG}..."
            cd /tmp
            unzip -o anima-linux-server.zip
            chmod +x anima-server

            echo "==> Stopping ${SERVICE_NAME}..."
            sudo systemctl stop ${SERVICE_NAME} || true

            echo "==> Installing new binary..."
            sudo mkdir -p ${INSTALL_DIR}
            sudo mv anima-server ${INSTALL_DIR}/anima-server
            sudo chown root:root ${INSTALL_DIR}/anima-server
            echo "${DEPLOY_TAG}" | sudo tee ${INSTALL_DIR}/VERSION > /dev/null

            echo "==> Starting ${SERVICE_NAME}..."
            sudo systemctl start ${SERVICE_NAME}

            echo "==> Verifying..."
            sleep 2
            if sudo systemctl is-active --quiet ${SERVICE_NAME}; then
              echo "==> Deploy successful! ${DEPLOY_TAG} is running."
            else
              echo "==> ERROR: Server failed to start!"
              sudo journalctl -u ${SERVICE_NAME} --no-pager -n 20
              exit 1
            fi

            rm -f /tmp/anima-linux-server.zip /tmp/VERSION
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
