name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================
  # macOS arm64 client
  # ============================================
  build-macos-client:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: client-macos-arm64-${{ hashFiles('Cargo.lock') }}
          restore-keys: client-macos-arm64-

      - name: Build client
        run: cargo build --release --bin client --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist/anima
          cp target/aarch64-apple-darwin/release/client dist/anima/anima
          cp -r assets dist/anima/
          cd dist && zip -r ../anima-macos-arm64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-macos-arm64
          path: anima-macos-arm64.zip

  # ============================================
  # Linux x64 client
  # ============================================
  build-linux-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: client-linux-x64-${{ hashFiles('Cargo.lock') }}
          restore-keys: client-linux-x64-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build client
        run: cargo build --release --bin client

      - name: Package
        run: |
          mkdir -p dist/anima
          cp target/release/client dist/anima/anima
          cp -r assets dist/anima/
          cd dist && zip -r ../anima-linux-x64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-x64
          path: anima-linux-x64.zip

  # ============================================
  # Windows x64 client (cross-compile from Linux)
  # ============================================
  build-windows-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: client-windows-x64-cross-${{ hashFiles('Cargo.lock') }}
          restore-keys: client-windows-x64-cross-

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Build client
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: cargo build --release --bin client --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          mkdir -p dist/anima
          cp target/x86_64-pc-windows-gnu/release/client.exe dist/anima/anima.exe
          cp -r assets dist/anima/
          cd dist && zip -r ../anima-windows-x64.zip anima/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-windows-x64
          path: anima-windows-x64.zip

  # ============================================
  # Linux x64 server (headless)
  # ============================================
  build-linux-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: server-linux-x64-${{ hashFiles('Cargo.lock') }}
          restore-keys: server-linux-x64-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Build server
        run: cargo build --release --bin server

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/server dist/anima-server
          cd dist && zip -r ../anima-linux-server.zip anima-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anima-linux-server
          path: anima-linux-server.zip

  # ============================================
  # Create GitHub Release with all artifacts
  # ============================================
  release:
    needs: [build-macos-client, build-linux-client, build-windows-client, build-linux-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="v${VERSION}-${SHORT_SHA}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Anima ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make_latest: true
          files: |
            artifacts/anima-macos-arm64/anima-macos-arm64.zip
            artifacts/anima-linux-x64/anima-linux-x64.zip
            artifacts/anima-windows-x64/anima-windows-x64.zip
            artifacts/anima-linux-server/anima-linux-server.zip

  # ============================================
  # Deploy server binary to Salt Lake City box
  # ============================================
  deploy-server:
    needs: [release]
    runs-on: ubuntu-latest
    # Only deploy from master branch pushes (not PRs, not tag-only)
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: anima-linux-server
          path: .

      - name: Deploy to game server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22}"

          # Upload new binary
          scp $SSH_OPTS anima-linux-server.zip "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/anima-linux-server.zip"

          # Run deploy script on server
          ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -euo pipefail

            INSTALL_DIR="/opt/anima"
            SERVICE_NAME="anima-server"

            echo "==> Extracting new server binary..."
            cd /tmp
            unzip -o anima-linux-server.zip
            chmod +x anima-server

            echo "==> Stopping ${SERVICE_NAME}..."
            sudo systemctl stop ${SERVICE_NAME} || true

            echo "==> Installing new binary..."
            sudo mkdir -p ${INSTALL_DIR}
            sudo mv anima-server ${INSTALL_DIR}/anima-server
            sudo chown root:root ${INSTALL_DIR}/anima-server

            echo "==> Starting ${SERVICE_NAME}..."
            sudo systemctl start ${SERVICE_NAME}

            echo "==> Verifying..."
            sleep 2
            if sudo systemctl is-active --quiet ${SERVICE_NAME}; then
              echo "==> Deploy successful! Server is running."
            else
              echo "==> ERROR: Server failed to start!"
              sudo journalctl -u ${SERVICE_NAME} --no-pager -n 20
              exit 1
            fi

            # Cleanup
            rm -f /tmp/anima-linux-server.zip
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
